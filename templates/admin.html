<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Admin Panel - OB TOPUP</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 30px; background-color: #f4f7f6; }
        h1 { color: #333; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
        th { background-color: #8a2be2; color: white; }
        tr:hover { background-color: #f9f9f9; }
        .status-pending { background: #ffeaa7; color: #d63031; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; }
    </style>
</head>
<body>
    <h1>Admin Dashboard - Received Orders</h1>
    <table>
        <thead>
            <tr>
                <th>Order ID</th>
                <th>Player UID</th>
                <th>Package Selected</th>
                <th>Payment Method</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody>
            {% for order in orders %}
            <tr>
                <td>#{{ order[0] }}</td>
                <td><strong>{{ order[1] }}</strong></td>
                <td>{{ order[2] }}</td>
                <td>{{ order[3] }}</td>
                <td><span class="status-pending">{{ order[4] }}</span></td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
