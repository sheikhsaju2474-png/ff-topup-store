<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel - Orders</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #121212; color: white; padding: 20px; }
        h1 { color: #ffcc00; text-align: center; }
        table { width: 90%; margin: 20px auto; border-collapse: collapse; background: #1e1e1e; }
        th, td { border: 1px solid #333; padding: 12px; text-align: center; }
        th { background-color: #ffcc00; color: black; }
        tr:nth-child(even) { background-color: #252525; }
        .back-btn { display: block; width: 100px; margin: 20px auto; text-align: center; padding: 10px; background: #ffcc00; color: black; text-decoration: none; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>
    <h1>Admin Dashboard - Free Fire Orders</h1>
    <table>
        <thead>
            <tr>
                <th>Order ID</th>
                <th>Player UID</th>
                <th>Selected Package</th>
                <th>TrxID (Payment)</th>
            </tr>
        </thead>
        <tbody>
            {% for order in orders %}
            <tr>
                <td>{{ order[0] }}</td>
                <td>{{ order[1] }}</td>
                <td>{{ order[2] }}</td>
                <td>{{ order[3] }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    <a href="/" class="back-btn">Go Back</a>
</body>
</html>
