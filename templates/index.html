<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Fire Topup</title>
    <style>
        body {
            margin: 0; font-family: Arial, sans-serif; background-color: #121212;
            color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }
        .phone-container {
            width: 360px; background-color: #1e1e1e; border: 2px solid #333;
            border-radius: 30px; padding: 20px; box-shadow: 0px 10px 25px rgba(0,0,0,0.7);
            position: relative; box-sizing: border-box;
        }
        .admin-menu {
            position: absolute; top: 25px; left: 25px; text-decoration: none;
            color: #ffcc00; font-size: 24px; font-weight: bold;
        }
        h1 { text-align: center; font-size: 24px; margin-top: 40px; }
        .package-box {
            background-color: #2a2a2a; border: 2px solid #ffcc00;
            border-radius: 10px; padding: 15px; text-align: center; margin: 20px 0;
        }
        .package-title { font-size: 18px; font-weight: bold; }
        .package-price { font-size: 16px; color: #ffcc00; margin-top: 5px; }
        form { display: flex; flex-direction: column; gap: 12px; }
        select, input[type="text"] {
            width: 100%; padding: 12px; border: 1px solid #444; border-radius: 8px;
            background-color: #2d2d2d; color: white; font-size: 14px; box-sizing: border-box;
        }
        button {
            width: 100%; padding: 12px; background-color: #ffcc00; color: black;
            border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer;
        }
        .footer-text { text-align: center; margin-top: 40px; font-size: 18px; color: #555555; font-style: italic; }
    </style>
</head>
<body>
    <div class="phone-container">
        <a href="/admin" class="admin-menu">☰</a>
        <h1>Free Fire Topup</h1>
        <div class="package-box">
            <div class="package-title">100 Diamond</div>
            <div class="package-price">85 Tk</div>
        </div>
        <form action="/submit" method="POST">
            <select name="package" required>
                <option value="100 Diamonds - 85 Tk">100 Diamond - 85 Tk</option>
                <option value="210 Diamonds - 165 Tk">210 Diamond - 165 Tk</option>
                <option value="530 Diamonds - 410 Tk">530 Diamond - 410 Tk</option>
            </select>
            <input type="text" name="uid" placeholder="Enter UID" required>
            <input type="text" name="payment" placeholder="Bkash/Nagad TrxID" required>
            <button type="submit">Submit Order</button>
        </form>
        <div class="footer-text">sheikh saju</div>
    </div>
</body>
</html>
