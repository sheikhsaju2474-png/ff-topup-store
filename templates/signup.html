<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Sign Up - OB TOPUP</title>
    <style>
        body { background-color: #f5f6fa; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .box { background: white; padding: 30px; border-radius: 12px; width: 100%; max-width: 400px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h2 { margin-bottom: 20px; color: #8a2be2; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 2px solid #e1e8ed; border-radius: 8px; outline: none; }
        .btn { width: 100%; background: #8a2be2; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Sign Up</h2> <form method="POST">
            <input type="text" name="name" placeholder="Your Name" required>
            <input type="email" name="email" placeholder="Your Email" required>
            <input type="text" name="phone" placeholder="Your Phone Number" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit" class="btn">Sign Up</button>
        </form>
        <p style="margin-top: 15px; font-size: 13px; text-align: center;">Already have an account? <a href="/login">Login Now</a></p>
    </div>
</body>
</html>
