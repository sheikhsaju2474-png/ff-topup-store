<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Sign Up - SHEIKH TOPUP</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f5f6fa; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); width: 100%; max-width: 350px; }
        h2 { text-align: center; color: #8a2be2; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #2ed573; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        p { font-size: 12px; text-align: center; color: #666; margin-top: 15px; }
        a { color: #8a2be2; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="box">
        <h2>নতুন অ্যাকাউন্ট খুলুন</h2>
        {% with messages = get_flashed_messages() %}
          {% if messages %}{% for m in messages %}<p style="color:red; font-weight:bold;">{{ m }}</p>{% endfor %}{% endif %}
        {% endwith %}
        <form method="POST">
            <input type="text" name="username" placeholder="একটি ইউনিক ইউজারনেম" required>
            <input type="email" name="email" placeholder="আপনার ইমেইল এড্রেস" required>
            <input type="password" name="password" placeholder="একটি স্ট্রং পাসওয়ার্ড" required>
            <button type="submit">অ্যাকাউন্ট তৈরি করুন</button>
        </form>
        <p>ইতিমধ্যে অ্যাকাউন্ট আছে? <a href="/login">Log In করুন</a></p>
    </div>
</body>
</html>
